  <header class="topbar">

      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="resume.html">Resume</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
      <div class="topbar-actions">
        <button class="topbar-btn" id="themeToggle" aria-label="Toggle theme">Dark</button>
        <button class="hamburger" id="hamburger" aria-label="Menu">&#9776;</button>
      </div>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebarOverlay">
    <div class="sidebar">
      <div class="sidebar-logo">Piyush More</div>
      <ul class="sidebar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>

  <main>
    <div class="page">
      <h1 class="page-title">Contact</h1>
      <p class="page-description">Have a question or want to work together?</p>

      <div class="contact-grid">
        <form class="contact-form" id="contactForm">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="What's this about?">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Your message..." required></textarea>
          </div>
          <button type="submit" class="btn-submit">Send</button>
        </form>

        <div class="contact-info">
          <h4>Email</h4>
          <a href="mailto:morepiyush1403@gmail.com">morepiyush1403@gmail.com</a>

          <h4>Location</h4>
          <p>India</p>

          <h4>Links</h4>
          <a href="https://github.com/morepiyush" target="_blank">GitHub</a><br>
          <a href="https://linkedin.com/in/" target="_blank">LinkedIn</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>Piyush More &middot; 2026</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
